<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yt-playlist-length</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo-icon">
                <img src="images/youtube.png" alt="logo">
            </div>
            <div class="head-text">
                <h1>Youtube Playlist length</h1>
                <p>Calculate total time duration of any YouTube playlist</p>
            </div>
        </header>

        <div class="input-section">
            <label class="input-label" for="Playlist-url">Playlist URL</label>    
            <div class="input-row">    
                <input type="url" id="playlist-url" placeholder="https://www.youtube.com/playlist?list=...">
                <button id="enter-btn">Get Playlist length</button>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
